repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
        name: gitleaks - Detect secrets in code
        description: Detect hardcoded secrets using regex patterns (offline, fast).
        stages: ["pre-commit", "pre-push"]
  - repo: https://github.com/trufflesecurity/trufflehog
    rev: v3.93.4
    hooks:
      - id: trufflehog
        name: TruffleHog - Detect verified secrets
        description: Detect secrets with online verification.
        stages: ["pre-commit", "pre-push"]
