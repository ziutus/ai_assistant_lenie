repos:
  - repo: local
    hooks:
      - id: trufflehog
        name: TruffleHog
        description: Detect secrets in your data.
        language: docker_image
        entry: 'trufflesecurity/trufflehog:latest git file:///src --only-verified --fail --since-commit HEAD'
        pass_filenames: false
        stages: ["pre-commit", "pre-push"]
