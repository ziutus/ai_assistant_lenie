repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
        name: gitleaks - Detect secrets in code
        description: Detect hardcoded secrets using regex patterns (offline, fast).
        stages: ["pre-commit", "pre-push"]
  - repo: https://github.com/trufflesecurity/trufflehog
    rev: v3.93.4
    hooks:
      - id: trufflehog
        name: TruffleHog - Detect verified secrets
        description: Detect secrets with online verification.
        stages: ["pre-commit", "pre-push"]
  - repo: local
    hooks:
      - id: scan-history-secrets
        name: Scan unpushed commit history for secrets
        description: Scans all commits between local branch and remote for secrets using TruffleHog.
        entry: ./scripts/scan-history-secrets.sh
        language: system
        stages: ["pre-push"]
        always_run: true
        pass_filenames: false
