AWSTemplateFormatVersion: '2010-09-09'
Description: Template to create a Passwords etc for Lenie application

Parameters:
  ProjectCode:
    Type: String
    Default: lenie
    Description: Project code for resource naming and tagging
  Environment:
    Type: String
    Default: dev
    Description: Deployment environment
    AllowedValues:
      - dev
      # Post-MVP: add prod, qa as needed

Resources:
  RDSPasswordSecret:
    Type: 'AWS::SecretsManager::Secret'
    Properties:
      Name: !Sub '/${ProjectCode}/${Environment}/rds/password'
      Description: 'Auto-generated RDS master user credentials'
      GenerateSecretString:
        SecretStringTemplate: !Sub '{"username": "${ProjectCode}"}'
        GenerateStringKey: password
        PasswordLength: 32
        ExcludeCharacters: '"@/\'''
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: !Ref ProjectCode
        - Key: ManagedBy
          Value: CloudFormation
        - Key: StackName
          Value: !Ref 'AWS::StackName'

  RDSPasswordSecretArnParameter:
    Type: 'AWS::SSM::Parameter'
    Properties:
      Name: !Sub '/${ProjectCode}/${Environment}/rds/secret-arn'
      Type: String
      Value: !Ref RDSPasswordSecret
      Description: ARN of the RDS password secret in Secrets Manager
      Tags:
        Project: !Ref ProjectCode
        Environment: !Ref Environment
        ManagedBy: CloudFormation
        StackName: !Ref 'AWS::StackName'
