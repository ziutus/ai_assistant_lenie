AWSTemplateFormatVersion: '2010-09-09'
Description: 'S3 bucket for app2 (target) frontend hosting for Project Lenie'

Parameters:
  ProjectCode:
    Type: String
    Default: lenie
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      # Post-MVP: add prod, qa as needed
    Description: Environment name
  CloudFrontDistributionId:
    Type: String
    Description: CloudFront distribution ID for OAC bucket policy

Resources:
  App2WebBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${ProjectCode}-${Environment}-app2-web'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
            BucketKeyEnabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: !Ref ProjectCode

  App2WebBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref App2WebBucket
      PolicyDocument:
        Version: '2012-10-17'
        Id: PolicyForCloudFrontPrivateContent
        Statement:
          - Sid: AllowCloudFrontServicePrincipal
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${App2WebBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistributionId}'
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt App2WebBucket.Arn
              - !Sub '${App2WebBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: 'false'

  # SSM Parameter exports
  App2WebBucketNameParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/${ProjectCode}/${Environment}/s3/app2-web/name'
      Type: String
      Value: !Ref App2WebBucket
      Description: 'S3 app2-web bucket name for Project Lenie'
      Tags:
        Environment: !Ref Environment
        Project: !Ref ProjectCode

  App2WebBucketArnParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/${ProjectCode}/${Environment}/s3/app2-web/arn'
      Type: String
      Value: !GetAtt App2WebBucket.Arn
      Description: 'S3 app2-web bucket ARN for Project Lenie'
      Tags:
        Environment: !Ref Environment
        Project: !Ref ProjectCode

  App2WebBucketDomainNameParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/${ProjectCode}/${Environment}/s3/app2-web/domain-name'
      Type: String
      Value: !GetAtt App2WebBucket.DomainName
      Description: 'S3 app2-web bucket domain name for Project Lenie'
      Tags:
        Environment: !Ref Environment
        Project: !Ref ProjectCode
