AWSTemplateFormatVersion: '2010-09-09'
Description: 'SCP - Block creation of SSO instances'
# PREREQUISITE: SCP policy type must be enabled on the organization root before deploying this stack:
#   aws organizations enable-policy-type --root-id <ROOT_ID> --policy-type SERVICE_CONTROL_POLICY
# This is required only once (fresh account setup). CloudFormation does not support enabling policy types.
Resources:
  BlackAllScpPolicy:
    Type: 'AWS::Organizations::Policy'
    DeletionPolicy: Retain
    Properties:
      Content: |
        {
            "Version": "2012-10-17",
            "Statement": [
                {
                    "Sid": "DenyMemberAccountInstances",
                    "Effect": "Deny",
                    "Action": [
                        "sso:CreateInstance"
                    ],
                    "Resource": "*"
                }
            ]
        }
      Description: "Deny Creation of SSO"
      Name: "BlockSSOCreation"
      Type: "SERVICE_CONTROL_POLICY"
      TargetIds:
        - !ImportValue organization-root-id
