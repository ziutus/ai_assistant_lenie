  # Stage managed by separate ApiStage resource
  ApiStage:
    Type: 'AWS::ApiGateway::Stage'
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      RestApiId: !Ref LenieApi
      DeploymentId: !Ref ApiDeployment
      StageName: 'v1'
      Description: 'CF-managed v1 stage'
      TracingEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: !Ref ProjectCode
        - Key: ManagedBy
          Value: CloudFormation
        - Key: StackName
          Value: !Ref 'AWS::StackName'
      MethodSettings:
        - HttpMethod: '*'
          ResourcePath: '/*'
          LoggingLevel: INFO
          MetricsEnabled: true
          # DataTraceEnabled logs full request/response bodies — review before enabling in production
          DataTraceEnabled: true

  # StageName kept on Deployment (CloudFormation does not support removing it from an existing resource)
  ApiDeployment:
    Type: 'AWS::ApiGateway::Deployment'
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      RestApiId: !Ref LenieApi
      StageName: 'v1'

  # SSM Parameter exports
  ApiGatewayIdParameter:
    Type: 'AWS::SSM::Parameter'
    Properties:
      Name: !Sub '/${ProjectCode}/${Environment}/apigateway/app/id'
      Type: String
      Value: !Ref LenieApi
      Description: 'API Gateway app REST API ID for Project Lenie'
      Tags:
        Environment: !Ref Environment
        Project: !Ref ProjectCode
        ManagedBy: CloudFormation
        StackName: !Ref 'AWS::StackName'

  ApiGatewayRootResourceIdParameter:
    Type: 'AWS::SSM::Parameter'
    Properties:
      Name: !Sub '/${ProjectCode}/${Environment}/apigateway/app/root-resource-id'
      Type: String
      Value: !GetAtt LenieApi.RootResourceId
      Description: 'API Gateway app root resource ID for Project Lenie'
      Tags:
        Environment: !Ref Environment
        Project: !Ref ProjectCode
        ManagedBy: CloudFormation
        StackName: !Ref 'AWS::StackName'

  ApiGatewayInvokeUrlParameter:
    Type: 'AWS::SSM::Parameter'
    Properties:
      Name: !Sub '/${ProjectCode}/${Environment}/apigateway/app/invoke-url'
      Type: String
      Value: !Sub 'https://${LenieApi}.execute-api.${AWS::Region}.amazonaws.com/v1'
      Description: 'API Gateway app invoke URL for Project Lenie'
      Tags:
        Environment: !Ref Environment
        Project: !Ref ProjectCode
        ManagedBy: CloudFormation
        StackName: !Ref 'AWS::StackName'

  # Lambda permissions for API Gateway to invoke Lambda functions
  # Wildcard SourceArn (/*) used for app-server-db and app-server-internet because
  # each Lambda serves multiple API paths. Path-specific permissions would require
  # separate AWS::Lambda::Permission per path. url-add uses path-specific SourceArn
  # because it serves a single path.
  AppServerDbLambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Sub '${ProjectCode}-${Environment}-app-server-db'
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${LenieApi}/*'

  AppServerInternetLambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Sub '${ProjectCode}-${Environment}-app-server-internet'
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${LenieApi}/*'

  UrlAddLambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Sub '${ProjectCode}-${Environment}-url-add'
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${LenieApi}/*/*/url_add'
