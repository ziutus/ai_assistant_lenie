name: lenie-ai

services:
  lenie-ai-server:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    ports:
      - "5000:5000"
    restart: no
    depends_on:
      - lenie-ai-db
    # For vault/aws backends, .env needs only bootstrap vars (SECRETS_BACKEND, SECRETS_ENV, etc.).
    # For env backend, .env needs ALL variables. See docs/security/secrets-management.md for details.
    # Generate backend-specific .env: python scripts/env_to_vault.py generate env-example --backend <env|vault|aws>
    env_file: .env
    volumes:
      - lenie-ai-data:/app/data
  lenie-ai-db:
#    image: pgvector/pgvector:pg17
    image: lenie-ai-db:latest
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - lenie-ai-db-data-3:/var/lib/postgresql
#      - ../../backend/database/init:/docker-entrypoint-initdb.d
    restart: unless-stopped
  lenie-ner-service:
    build:
      context: ../..
      dockerfile: ner_service/Dockerfile
    profiles: ["ner"]
    # Dev-only published port so a backend running outside Docker can reach the
    # service (NER_SERVICE_URL=http://localhost:8090). The NAS deployment keeps
    # the service internal-only — see ner_service/README.md.
    ports:
      - "8090:8090"
    restart: unless-stopped
  lenie-ai-fronted:
    build:
      context: ../..
      dockerfile: web_interface_react/Dockerfile
    ports:
      - "3000:80"
    restart: no

volumes:
  lenie-ai-db-data-3:
    driver: local
  lenie-ai-data:
    driver: local
networks:
  default:
    driver: bridge
