# Docker Compose for NAS (QNAP TS-453Be) deployment
# Images pulled from private registry at 192.168.200.7:5005
#
# Usage on NAS:
#   DOCKER=/share/CACHEDEV4_DATA/.qpkg/container-station/usr/bin/.libs/docker
#   $DOCKER compose -f /share/ContainerNew/lenie-compose/compose.nas.yaml up -d
#   $DOCKER compose -f /share/ContainerNew/lenie-compose/compose.nas.yaml ps

services:
  lenie-ai-db:
    image: 192.168.200.7:5005/lenie-ai-db:latest
    container_name: lenie-ai-db
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_PASSWORD: ${NAS_DB_PASSWORD:-postgres}
    volumes:
      - lenie-ai-db-data:/var/lib/postgresql
    networks:
      - lenie-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  lenie-ai-server:
    image: 192.168.200.7:5005/lenie-ai-server:latest
    container_name: lenie-ai-server
    restart: unless-stopped
    ports:
      - "5055:5000"
    env_file:
      - /share/ContainerNew/lenie-env/.env
    # NOTE: this backend runs with SECRETS_BACKEND=vault, so entries here are
    # NOT read by the app's config_loader (only bootstrap vars + Vault KV are)
    # — kept only so `env`-backend/local runs of this compose file still work.
    # The value that actually matters is in Vault: secret/lenie/dev SITE_RULES_PATH.
    # To change it: MSYS_NO_PATHCONV=1 python scripts/env_to_vault.py vault set
    # --env dev SITE_RULES_PATH=/app/config/site_rules.json, then restart the
    # container. See docs/security/secrets-management.md#adding-new-variables.
    environment:
      SITE_RULES_PATH: /app/config/site_rules.json
    volumes:
      - lenie-ai-data:/app/data
      - /share/ContainerNew/lenie-config:/app/config:ro
    networks:
      - lenie-net
    depends_on:
      lenie-ai-db:
        condition: service_healthy

  lenie-ai-frontend:
    image: 192.168.200.7:5005/lenie-ai-frontend:latest
    container_name: lenie-ai-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - lenie-net

  lenie-ai-app2:
    image: 192.168.200.7:5005/lenie-ai-app2:latest
    container_name: lenie-ai-app2
    restart: unless-stopped
    ports:
      - "3001:80"
    networks:
      - lenie-net

  lenie-minio:
    image: minio/minio:latest
    container_name: lenie-minio
    restart: unless-stopped
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    env_file:
      - /share/ContainerNew/lenie-env/minio.env
    command: server /data --console-address ":9001"
    volumes:
      - lenie-minio-data:/data
    networks:
      - lenie-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 5s
      retries: 3

  lenie-minio-init:
    image: minio/mc:latest
    restart: "no"
    env_file:
      - /share/ContainerNew/lenie-env/minio.env
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        until mc alias set lenie http://lenie-minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do sleep 2; done;
        mc mb --ignore-existing lenie/lenie-storage
    networks:
      - lenie-net
    depends_on:
      lenie-minio:
        condition: service_healthy

  lenie-registry:
    image: registry:2
    container_name: lenie-registry
    restart: unless-stopped
    ports:
      - "5005:5000"
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
      REGISTRY_HTTP_HEADERS_Access-Control-Allow-Origin: '["*"]'
      REGISTRY_HTTP_HEADERS_Access-Control-Allow-Methods: '["HEAD","GET","OPTIONS","DELETE"]'
      REGISTRY_HTTP_HEADERS_Access-Control-Allow-Headers: '["Authorization","Accept","Cache-Control"]'
      REGISTRY_HTTP_HEADERS_Access-Control-Expose-Headers: '["Docker-Content-Digest"]'
    volumes:
      - lenie-registry-data:/var/lib/registry
    networks:
      - lenie-net

  lenie-registry-ui:
    image: joxit/docker-registry-ui:latest
    container_name: lenie-registry-ui
    restart: unless-stopped
    ports:
      - "8550:80"
    environment:
      SINGLE_REGISTRY: "true"
      REGISTRY_TITLE: "Lenie AI Registry"
      REGISTRY_URL: "http://192.168.200.7:5005"
      DELETE_IMAGES: "true"
    networks:
      - lenie-net
    depends_on:
      - lenie-registry

  lenie-vault:
    image: hashicorp/vault:1.21.3
    container_name: lenie-vault
    restart: unless-stopped
    ports:
      - "8210:8200"
    cap_add:
      - IPC_LOCK
    env_file:
      - /share/ContainerNew/lenie-env/vault.env
    volumes:
      - /share/ContainerNew/vault/config:/vault/config
      - /share/ContainerNew/vault/data:/vault/file
      - /share/ContainerNew/vault/logs:/vault/logs
    command: server
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - lenie-net

  lenie-ner-service:
    image: 192.168.200.7:5005/lenie-ner-service:latest
    container_name: lenie-ner-service
    restart: unless-stopped
    # No published port — internal-only, reachable from other containers via lenie-net
    # (http://lenie-ner-service:8090). See ner_service/README.md.
    networks:
      - lenie-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  lenie-net:
    name: lenie-net
    external: true

volumes:
  lenie-ai-db-data:
    external: true
  lenie-ai-data:
    external: true
  lenie-minio-data:
    external: true
  lenie-registry-data:
    external: true
